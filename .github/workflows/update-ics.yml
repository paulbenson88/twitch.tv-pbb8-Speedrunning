name: Update ICS Calendar Files

# Regenerate calendar.ics and calendar-others.ics whenever the event data
# changes, so that calendar subscribers always see up-to-date information.
on:
  push:
    branches:
      - main
    paths:
      - 'js/events.js'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  update-ics:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the regenerated .ics files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate ICS files from events.js
        run: node scripts/generate-ics.js

      - name: Commit and push updated ICS files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics calendar-others.ics
          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "ICS files are already up to date — nothing to commit."
          else
            git commit -m "chore: auto-update ICS calendar files from events.js [skip ci]"
          # NOTE: '[skip ci]' in the commit message prevents this workflow from
          # triggering itself again when the regenerated .ics files are pushed,
          # which would otherwise cause an infinite workflow loop.
            git push
          fi
